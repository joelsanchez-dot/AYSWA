<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Nueva Duda</title>
</head>
<body>
    <h1>Publicar una duda en el Foro</h1>
    <form method="POST">
        {% csrf_token %}
        <p>
            <label>Título:</label><br>
            <input type="text" name="titulo" required>
        </p>
        <p>
            <label>Contenido:</label><br>
            <textarea name="contenido" rows="5" required></textarea>
        </p>
        <button type="submit">Publicar Duda</button>
    </form>
    <br>
    <a href="{% url 'lista_dudas' %}">Volver al foro</a>
</body>
</html>
