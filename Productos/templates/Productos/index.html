<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Apartados</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2 class="text-primary"> Registrar Nuevo Apartado</h2>
    
    <form method="POST" class="card card-body shadow-sm mb-5">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6 mb-2">
                <input type="text" name="cliente" placeholder="Nombre del Cliente" class="form-control" required>
            </div>
            <div class="col-md-6 mb-2">
                <input type="text" name="producto" placeholder="Nombre del Producto" class="form-control" required>
            </div>
            <div class="col-md-4 mb-2">
                <input type="number" step="0.01" name="precio" placeholder="Precio Total $" class="form-control" required>
            </div>
            <div class="col-md-4 mb-2">
                <input type="number" step="0.01" name="apartado" placeholder="Monto Apartado $" class="form-control" required>
            </div>
            <div class="col-md-4 mb-2 d-grid">
                <button type="submit" class="btn btn-success">Guardar Apartado</button>
            </div>
        </div>
    </form>

    <h2> Productos Apartados</h2>
    <table class="table table-hover border">
        <thead class="table-dark">
            <tr>
                <th>Cliente</th>
                <th>Producto</th>
                <th>Precio</th>
                <th>Apartado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in productos %}
            <tr>
                <td>{{ p.nombre_cliente }}</td>
                <td>{{ p.producto }}</td>
                <td>${{ p.precio_total }}</td>
                <td>${{ p.monto_apartado }}</td>
                <td>
                    <a href="{% url 'editar_producto' p.pk %}" class="btn btn-sm btn-warning">Editar</a>
                    <a href="{% url 'eliminar_producto' p.pk %}" class="btn btn-sm btn-danger" onclick="return confirm('¿Seguro que quieres eliminarlo?')">Borrar</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="text-center text-muted">No hay productos apartados todavía.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
