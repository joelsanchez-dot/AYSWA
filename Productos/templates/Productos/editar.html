<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modificar Apartado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-warning text-dark">
            <h2 class="mb-0">✏️ Modificar Registro</h2>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Nombre del Cliente</label>
                    <input type="text" name="cliente" value="{{ producto.nombre_cliente }}" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Producto</label>
                    <input type="text" name="producto" value="{{ producto.producto }}" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Precio Total</label>
                    <input type="number" step="0.01" name="precio" value="{{ producto.precio_total }}" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Monto Apartado</label>
                    <input type="number" step="0.01" name="apartado" value="{{ producto.monto_apartado }}" class="form-control">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Actualizar Cambios</button>
                    <a href="{% url 'listar_productos' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
