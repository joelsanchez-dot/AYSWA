<!DOCTYPE html>
<html>
<head>
    <title>Lista de Productos Apartados</title>
</head>
<body>

<h1>Productos Apartados</h1>

<a href="{% url 'crear_producto' %}">Agregar Nuevo Producto</a>

<table border="1">
    <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Precio</th>
        <th>Fecha Apartado</th>
        <th>Cliente</th>
        <th>Acciones</th>
    </tr>

    {% for producto in productos %}
    <tr>
        <td>{{ producto.nombre }}</td>
        <td>{{ producto.descripcion }}</td>
        <td>{{ producto.precio }}</td>
        <td>{{ producto.fecha_apartado }}</td>
        <td>{{ producto.cliente }}</td>
        <td>
            <a href="{% url 'editar_producto' producto.id %}">Editar</a>
            <a href="{% url 'eliminar_producto' producto.id %}">Eliminar</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
