<!DOCTYPE html>
<html>
<head>
    <title>Crear Producto</title>
</head>
<body>

<h1>Agregar Producto</h1>

<form method="POST">
    {% csrf_token %}
    Nombre: <input type="text" name="nombre"><br><br>
    Descripción: <input type="text" name="descripcion"><br><br>
    Precio: <input type="number" step="0.01" name="precio"><br><br>
    Fecha Apartado: <input type="date" name="fecha_apartado"><br><br>
    Cliente: <input type="text" name="cliente"><br><br>
    <button type="submit">Guardar</button>
</form>

<a href="{% url 'lista_productos' %}">Volver</a>

</body>
</html>
