<!DOCTYPE html>
<html>
<head>
    <title>Repositorio de Archivos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Repositorio de Archivos</h4>
                <a href="{% url 'crear_archivo' %}" class="btn btn-light btn-sm">
                    + Subir Archivo
                </a>
            </div>

            <div class="card-body">

                {% if archivos %}
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Fecha</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for archivo in archivos %}
                        <tr>
                            <td>{{ archivo.nombre }}</td>
                            <td>{{ archivo.fecha_subida }}</td>
                            <td class="text-center">
                                <a href="{% url 'descargar_archivo' archivo.id %}" class="btn btn-success btn-sm">Descargar</a>
                                <a href="{% url 'editar_archivo' archivo.id %}" class="btn btn-warning btn-sm">Editar</a>
                                <a href="{% url 'eliminar_archivo' archivo.id %}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('¿Seguro que deseas eliminar este archivo?');">
                                    Eliminar
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                {% else %}
                <p class="text-center text-muted">No hay archivos registrados.</p>
                {% endif %}

            </div>
        </div>
    </div>

</body>
</html>
