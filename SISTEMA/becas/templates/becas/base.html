<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Becas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1a3a6b;
            --secondary: #e8b84b;
        }
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: var(--primary) !important; }
        .navbar-brand { font-weight: 700; font-size: 1.3rem; color: var(--secondary) !important; }
        .nav-link { color: rgba(255,255,255,0.85) !important; }
        .nav-link:hover { color: var(--secondary) !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        .card-header { background: var(--primary); color: white; border-radius: 12px 12px 0 0 !important; }
        .btn-primary { background: var(--primary); border-color: var(--primary); }
        .btn-primary:hover { background: #122d55; }
        .badge-pendiente { background: #f0ad4e; }
        .badge-aprobada { background: #28a745; }
        .badge-rechazada { background: #dc3545; }
        .stat-card { border-left: 5px solid var(--secondary); }
        footer { background: var(--primary); color: rgba(255,255,255,0.7); padding: 20px 0; margin-top: 60px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            <i class="fas fa-graduation-cap me-2"></i>Sistema de Becas
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}"><i class="fas fa-home me-1"></i>Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'solicitar_beca' %}"><i class="fas fa-file-alt me-1"></i>Solicitar Beca</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'panel_admin' %}"><i class="fas fa-cogs me-1"></i>Panel Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'estadisticas' %}"><i class="fas fa-chart-bar me-1"></i>Estadísticas</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-4">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>

<footer class="text-center">
    <p class="mb-0"><i class="fas fa-graduation-cap me-2"></i>Sistema de Gestión de Becas &copy; 2026</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
