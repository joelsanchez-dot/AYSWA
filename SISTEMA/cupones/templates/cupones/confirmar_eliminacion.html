<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5">
    <div class="card border-danger mx-auto" style="max-width: 400px;">
        <div class="card-body text-center">
            <h4 class="text-danger">¿Eliminar Cupón?</h4>
            <p>¿Estás seguro de eliminar el código <strong>{{ object.codigo }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Confirmar</button>
                <a href="{% url 'cupon_lista' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
        </div>
    </div>
</body>
</html>
