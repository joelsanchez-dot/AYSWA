<h1>Productos</h1>

<p><a href="{% url 'producto_create' %}">+ Nuevo producto</a></p>

<table border="1" cellpadding="6">
  <tr>
    <th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Activo</th><th>Acciones</th>
  </tr>
  {% for p in productos %}
  <tr>
    <td>{{ p.id }}</td>
    <td>{{ p.nombre }}</td>
    <td>{{ p.precio }}</td>
    <td>{{ p.stock }}</td>
    <td>{{ p.activo }}</td>
    <td>
      <a href="{% url 'producto_update' p.id %}">Editar</a> |
      <a href="{% url 'producto_delete' p.id %}">Eliminar</a>
    </td>
  </tr>
  {% empty %}
  <tr><td colspan="6">No hay productos.</td></tr>
  {% endfor %}
</table>

<p><a href="{% url 'home' %}">Inicio</a></p>
