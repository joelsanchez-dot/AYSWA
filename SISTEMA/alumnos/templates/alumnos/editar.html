{% extends 'alumnos/base.html' %}

{% block content %}

<div class="card p-4 shadow col-md-6 mx-auto">

    <h1 class="mb-4 text-center">Editar Materia</h1>

    <a href="/" class="btn btn-soft mb-3">← Volver</a>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" name="nombre" class="form-control" value="{{ materia.nombre }}">
        </div>

        <div class="mb-3">
            <label>Créditos</label>
            <input type="number" name="creditos" class="form-control" value="{{ materia.creditos }}">
        </div>

        <div class="mb-3">
            <label>Horario</label>
            <input type="text" name="horario" class="form-control" value="{{ materia.horario }}">
        </div>
        <div class="mb-3">
            <label>Estatus</label>
            <select name="estatus" class="form-control">
                <option value="Pendiente" {% if materia.estatus=='Pendiente' %}selected{% endif %}>Pendiente</option>
                <option value="Cursando" {% if materia.estatus=='Cursando' %}selected{% endif %}>Cursando</option>
                <option value="Aprobada" {% if materia.estatus=='Aprobada' %}selected{% endif %}>Aprobada</option>
            </select>
        </div>
        <div class="mb-3">
            <label>Calificación</label>
            <input type="number" step="0.1" name="calificacion" class="form-control"
                value="{{ materia.calificacion|default:0 }}">
        </div>
        <button class="btn btn-pink w-100">Guardar Cambios</button>

    </form>

</div>

{% endblock %}
