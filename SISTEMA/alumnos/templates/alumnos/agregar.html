{% extends 'alumnos/base.html' %}

{% block content %}

<div class="card p-4 shadow col-md-6 mx-auto">

    <h1 class="mb-4 text-center">Agregar Materia</h1>
<a href="/" class="btn btn-pink mb-3">← Volver al menú</a>
    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" name="nombre" class="form-control">
        </div>

        <div class="mb-3">
            <label>Créditos</label>
            <input type="number" name="creditos" class="form-control">
        </div>

        <div class="mb-3">
            <label>Horario</label>
            <input type="text" name="horario" class="form-control">
        </div>

        <button class="btn btn-pink w-100">Guardar</button>

    </form>

</div>

{% endblock %}
