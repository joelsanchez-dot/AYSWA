<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Materias</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f0f14;
            color: white;
        }

        .card {
            background-color: #1b1b25;
            border-radius: 15px;
        }

        .btn-pink {
            background-color: #ff4da6;
            border: none;
        }

        .btn-pink:hover {
            background-color: #ff1a8c;
        }

        h1 {
            color: #ff4da6;
        }
        label {
    color: #ff4da6;
    font-weight: 500;
}

.form-control {
    background-color: #2a2a3a;
    border: none;
    color: white;
}

.form-control::placeholder {
    color: #bbbbbb;
}

.form-control:focus {
    background-color: #2a2a3a;
    color: white;
    box-shadow: 0 0 5px #ff4da6;
}
.btn-soft {
    border: 1px solid #ff4da6;
    color: #ff4da6;
}

.btn-soft:hover {
    background-color: #ff4da6;
    color: white;
}
    </style>
</head>

<body>

<div class="container mt-5">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
