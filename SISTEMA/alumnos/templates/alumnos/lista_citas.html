<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">
    <h2>🦷 Agenda de Citas Dentales</h2>
    <a href="{% url 'crear_cita' %}" class="btn btn-primary mb-3">+ Nueva Cita</a>
    
    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>Paciente</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for cita in citas %}
            <tr>
                <td>{{ cita.paciente }}</td>
                <td>{{ cita.fecha }}</td>
                <td>{{ cita.hora }}</td>
                <td>{{ cita.get_estado_display }}</td>
                <td>
                    <a href="{% url 'editar_cita' cita.id %}" class="btn btn-sm btn-warning">Editar</a>
                    <a href="{% url 'eliminar_cita' cita.id %}" class="btn btn-sm btn-danger">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
